name: Daily Stock Sync

on:
  schedule:
    # 台灣時間 21:30 = UTC 13:30，週一到週五
    - cron: '30 13 * * 1-5'
  # 允許手動觸發 (方便測試)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    # 1. 把程式碼抓下來
    - uses: actions/checkout@v3

    # 2. 安裝 .NET 環境
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 9.0.x  # 你的專案是用 .NET 8 嗎？如果是 6 或 7 要改一下

    # 3. 還原套件
    - name: Restore dependencies
      run: dotnet restore metastock-sync/metastock-sync.csproj

    # 4. 執行同步程式
    - name: Run Sync App
      run: dotnet run --project metastock-sync/metastock-sync.csproj --no-restore
      env:
        # 這裡把 GitHub Secrets 注入到環境變數
        PG_CONNECTION: ${{ secrets.PG_CONNECTION }}